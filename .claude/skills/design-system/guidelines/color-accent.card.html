<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; }
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
  .sw .chip { height: 84px; }
  .sw .meta { padding: 10px 12px; background: var(--surface); }
  .sw .name { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--fg); }
  .sw .hex { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); margin-top: 2px; text-transform: uppercase; }
  .sw .role { font-size: var(--text-xs); color: var(--muted); margin-top: 1px; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--cyan-light)"></div><div class="meta"><div class="name">Cyan Light</div><div class="hex">#88DCFF</div><div class="role">on dark text</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan)"></div><div class="meta"><div class="name">Cyan Base</div><div class="hex">#56CCF2</div><div class="role">--highlight</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-dark)"></div><div class="meta"><div class="name">Cyan Dark</div><div class="hex">#2BB5E0</div><div class="role">borders / icons</div></div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x180" name="Primary · Cobalt Blue" subtitle="The single interactive accent — links, active, focus, CTAs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; }
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
  .sw .chip { height: 84px; }
  .sw .meta { padding: 10px 12px; background: var(--surface); }
  .sw .name { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--fg); }
  .sw .hex { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); margin-top: 2px; text-transform: uppercase; }
  .sw .role { font-size: var(--text-xs); color: var(--muted); margin-top: 1px; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--primary-light)"></div><div class="meta"><div class="name">Primary Light</div><div class="hex">#7BBDFF</div><div class="role">hover / pressed</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="meta"><div class="name">Primary Base</div><div class="hex">#4A9EFF</div><div class="role">--accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-dark)"></div><div class="meta"><div class="name">Primary Dark</div><div class="hex">#1A7FE8</div><div class="role">active / pressed</div></div></div>
  </div>
</body>
</html>

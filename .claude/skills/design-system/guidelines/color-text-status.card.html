<!-- @dsCard group="Colors" viewport="700x150" name="Text & Status" subtitle="Ink, muted text, and semantic status hues" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { display: flex; align-items: center; gap: 9px; }
  .dot { width: 26px; height: 26px; border-radius: var(--radius); border: 1px solid var(--border); flex: none; }
  .name { font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--fg); line-height: 1.2; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><span class="dot" style="background:var(--ink)"></span><div><div class="name">Primary Text</div><div class="hex">#F0F4FF</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--ink-muted)"></span><div><div class="name">Secondary Text</div><div class="hex">#6B7FA8</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--border)"></span><div><div class="name">Border</div><div class="hex">#243750</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--code-bg)"></span><div><div class="name">Code BG</div><div class="hex">#0E1A2D</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--highlight-soft)"></span><div><div class="name">Mark / Sel</div><div class="hex">cyan 16%</div></div></div>
  </div>
  <div class="row">
    <div class="sw"><span class="dot" style="background:var(--success)"></span><div><div class="name">Success</div><div class="hex">#34D399</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--warning)"></span><div><div class="name">Warning</div><div class="hex">#F5B14C</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--error)"></span><div><div class="name">Error</div><div class="hex">#FF6B6B</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--accent-soft)"></span><div><div class="name">Accent Soft</div><div class="hex">blue 14%</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--accent)"></span><div><div class="name">Accent</div><div class="hex">#4A9EFF</div></div></div>
  </div>
</body>
</html>

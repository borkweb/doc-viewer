<!-- @dsCard group="Type" viewport="700x210" name="Mono · JetBrains Mono" subtitle="Code blocks, inline code, refs, and metadata" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; }
  pre { margin: 0; font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
    background: var(--code-bg); color: var(--code-fg); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 14px 16px; overflow: hidden; }
  .k { color: var(--primary-light); } .s { color: var(--cyan); } .c { color: var(--muted); }
  .weights { display: flex; gap: 22px; margin-top: 14px; font-family: var(--font-mono); }
  .weights div { font-size: 14px; color: var(--fg); }
  .weights span { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--font-ui); }
</style>
</head>
<body>
  <pre><span class="c">// re-run the Project pipeline</span>
<span class="k">async function</span> rebuild(project) {
  <span class="k">const</span> docs = <span class="k">await</span> discover(project.<span class="s">source</span>)
  <span class="k">return</span> index(parse(docs))
}</pre>
  <div class="weights">
    <div style="font-weight:400">Regular 400<span>body code</span></div>
    <div style="font-weight:500">Medium 500<span>emphasis</span></div>
    <div style="font-weight:600">Semibold 600<span>keywords</span></div>
    <div style="font-weight:700">Bold 700<span>headings</span></div>
  </div>
</body>
</html>

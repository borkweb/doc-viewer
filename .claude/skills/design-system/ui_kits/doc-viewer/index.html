<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Doc Viewer — Cobalt Reader</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--desk); display: flex; align-items: center; justify-content: center; padding: 24px; transition: background var(--transition-slow); }

  .dv-window { width: min(1180px, 100%); height: min(740px, calc(100vh - 48px));
    display: flex; flex-direction: column; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); overflow: hidden; }

  /* Title bar */
  .dv-titlebar { display: flex; align-items: center; gap: 12px; height: 40px; flex: none;
    padding: 0 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .dv-lights { display: flex; gap: 8px; }
  .dv-light { width: 12px; height: 12px; border-radius: 50%; }
  .dv-close { background: #ff5f57; } .dv-min { background: #febc2e; } .dv-max { background: #28c840; }
  .dv-title { flex: 1; text-align: center; font-size: var(--text-sm); color: var(--muted); font-weight: var(--weight-medium); }
  .dv-theme-toggle { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
    background: none; border: 0; border-radius: var(--radius); color: var(--muted); cursor: pointer; font-size: 13px;
    transition: background var(--transition), color var(--transition); }
  .dv-theme-toggle:hover { background: var(--surface-alt); color: var(--accent); }

  .dv-body { flex: 1; display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 0; }

  /* Sidebar */
  .dv-sidebar { background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0; }
  .dv-side-head { display: flex; gap: 6px; padding: 8px; align-items: center; }
  .dv-proj-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 2px 12px 8px; }
  .dv-proj-sub { display: flex; align-items: center; gap: 6px; font-size: var(--text-xs);
    color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dv-proj-sub i { font-size: 11px; }
  .dv-search { padding: 4px 8px 8px; border-bottom: 1px solid var(--border); }
  .dv-scroll { flex: 1; overflow-y: auto; padding: 8px 6px; min-height: 0; }
  .dv-empty-side { color: var(--muted); padding: 20px 12px; font-size: var(--text-sm); }

  /* Content */
  .dv-content { overflow-y: auto; min-height: 0; }
  .dv-content--empty { display: flex; align-items: center; justify-content: center; }
  .dv-toolbar { position: sticky; top: 0; z-index: 2; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; height: 48px; padding: 0 32px;
    background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border); }
  .dv-crumb { display: flex; align-items: center; gap: 9px; font-size: var(--text-sm); color: var(--muted); }
  .dv-crumb i { font-size: 9px; }
  .dv-toolbar-actions { display: flex; align-items: center; gap: 10px; }
  .dv-article { padding: 36px 48px 96px; margin: 0; }

  /* Diagram placeholder */
  .dv-diagram { margin: 1.4em 0; height: 220px; background: var(--diagram-bg);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    display: flex; align-items: flex-start; }
  .dv-diagram-head { display: flex; align-items: center; gap: 8px; padding: 12px 16px;
    color: var(--muted); font-size: var(--text-sm); font-family: var(--font-ui); }
  .dv-diagram-head i { color: var(--accent); }

  /* Empty state */
  .dv-empty { text-align: center; max-width: 360px; }
  .dv-empty > i { font-size: 40px; color: var(--faint); }
  .dv-empty-title { font-size: var(--text-lg); color: var(--fg); font-weight: var(--weight-semibold); margin: 18px 0 6px; }
  .dv-empty-sub { font-size: var(--text-base); color: var(--muted); line-height: 1.6; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Reader.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>

<!-- @template name="Documentation page" description="Cobalt Reader doc-reading layout — sidebar nav tree + reading pane with rendered prose" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Documentation — Cobalt Reader</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; }
  .doc-layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; }
  .doc-nav { background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; }
  .doc-nav-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); }
  .doc-nav-head .mark { display: inline-flex; width: 26px; height: 26px; border-radius: var(--radius);
    background: var(--accent-soft); color: var(--accent); align-items: center; justify-content: center; }
  .doc-nav-head .name { font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--fg); }
  .doc-nav-rows { flex: 1; overflow-y: auto; padding: 10px 8px; display: flex; flex-direction: column; gap: 1px; }
  .doc-folder { color: var(--muted); font-size: var(--text-label); font-weight: 500;
    text-transform: uppercase; letter-spacing: var(--tracking-label); padding: 12px 8px 4px; }
  .doc-main { overflow-y: auto; }
  .doc-toolbar { position: sticky; top: 0; z-index: 2; display: flex; align-items: center;
    justify-content: space-between; height: 52px; padding: 0 40px;
    background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border); }
  .doc-crumb { display: flex; align-items: center; gap: 9px; font-size: var(--text-sm); color: var(--muted); }
  .doc-crumb i { font-size: 9px; }
  .doc-body { padding: 40px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function mount() {
    const ns = window.CobaltReaderDesignSystem_feb28f;
    if (!ns) { setTimeout(mount, 40); return; }
    const { TreeItem, Input, Button, Badge, IconButton } = ns;

    function Page() {
      const [active, setActive] = React.useState('domain-model');
      const [theme, setTheme] = React.useState(() => localStorage.getItem('cr-theme') || 'dark');
      React.useEffect(() => { document.documentElement.dataset.theme = theme; localStorage.setItem('cr-theme', theme); }, [theme]);
      return (
        <div className="doc-layout">
          <nav className="doc-nav">
            <div className="doc-nav-head">
              <span className="mark"><i className="fa-solid fa-book"></i></span>
              <span className="name">Your Project</span>
            </div>
            <div style={{ padding: '8px' }}>
              <Input flush type="search" icon="fa-solid fa-magnifying-glass" placeholder="Search docs…" />
            </div>
            <div className="doc-nav-rows">
              <TreeItem kind="md" label="Overview" onClick={() => setActive('overview')} active={active === 'overview'} />
              <div className="doc-folder">Concepts</div>
              <TreeItem kind="md" label="Domain model" depth={1} onClick={() => setActive('domain-model')} active={active === 'domain-model'} />
              <TreeItem kind="md" label="Getting started" depth={1} onClick={() => setActive('getting-started')} active={active === 'getting-started'} />
              <TreeItem kind="folder" label="Reference" open depth={0} />
              <TreeItem kind="md" label="API" depth={1} onClick={() => setActive('api')} active={active === 'api'} />
            </div>
          </nav>
          <main className="doc-main">
            <div className="doc-toolbar">
              <span className="doc-crumb">Your Project<i className="fa-solid fa-chevron-right"></i>Domain model</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <IconButton icon={theme === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun'}
                  label="Toggle theme" onClick={() => setTheme((t) => (t === 'light' ? 'dark' : 'light'))} />
                <Button size="sm" variant="ghost" icon="fa-solid fa-rotate">Reindex</Button>
              </div>
            </div>
            <article className="cobalt-doc doc-body">
              <h1>Domain model</h1>
              <p>Replace this with your content. Body copy uses the <code>.cobalt-doc</code> reading
              typography — comfortable line length and leading for sustained reading.</p>
              <h2>Core ideas</h2>
              <p>Headings, <a href="#">links</a>, and <mark>highlights</mark> all pick up the cobalt
              palette automatically. Use sentence case and terse, precise copy.</p>
              <pre><code>npm install your-project</code></pre>
            </article>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  }
  document.addEventListener('DOMContentLoaded', mount);
</script>
</body>
</html>
